version: "3.9"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://resourceful:resourceful@db:5432/resourceful
      - SECRET_KEY=${SECRET_KEY:-generate-with-openssl-rand-hex-32}
      - DEBUG=false
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: resourceful
      POSTGRES_PASSWORD: resourceful
      POSTGRES_DB: resourceful
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resourceful"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
