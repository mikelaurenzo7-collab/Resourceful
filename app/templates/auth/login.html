{% extends "base.html" %}
{% block title %}Login — Resourceful{% endblock %}

{% block content %}
<div class="flex min-h-[calc(100vh-200px)] flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="w-12 h-12 bg-brand-500 rounded-xl flex items-center justify-center mx-auto">
            <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
        </div>
        <h2 class="mt-6 text-center text-2xl font-bold text-white">Sign in to your account</h2>
        <p class="mt-2 text-center text-sm text-gray-400">
            Or <a href="/register" class="text-brand-400 hover:text-brand-300 font-medium">create a new account</a>
        </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-gray-900 border border-gray-800 py-8 px-4 shadow-xl rounded-xl sm:px-10">
            {% if error %}
            <div class="mb-4 rounded-lg bg-red-900/50 border border-red-800 p-3 text-sm text-red-200">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-6">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-300">Email address</label>
                    <input type="email" name="email" id="email" required
                        class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white placeholder-gray-500 focus:border-brand-500 focus:ring-brand-500 focus:outline-none sm:text-sm"
                        placeholder="you@example.com">
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                    <input type="password" name="password" id="password" required
                        class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white placeholder-gray-500 focus:border-brand-500 focus:ring-brand-500 focus:outline-none sm:text-sm"
                        placeholder="Enter your password">
                </div>

                <button type="submit"
                    class="w-full flex justify-center py-2.5 px-4 rounded-lg bg-brand-600 hover:bg-brand-500 text-white font-medium text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500 focus:ring-offset-2 focus:ring-offset-gray-900">
                    Sign in
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
