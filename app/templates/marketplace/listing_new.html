{% extends "base.html" %}
{% block title %}New Listing — Resourceful{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl px-4 py-8 sm:px-6 lg:px-8 animate-fade-in">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white">List a Resource</h1>
        <p class="mt-1 text-gray-400">Start earning from your idle assets. Fill out the details below.</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        {% if error %}
        <div class="mb-4 rounded-lg bg-red-900/50 border border-red-800 p-3 text-sm text-red-200">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/listings/create" class="space-y-6">
            <!-- Resource Type -->
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Resource Type</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="resource_type" value="solar" class="sr-only peer"
                            {% if selected_type == 'solar' %}checked{% endif %}
                            hx-get="/htmx/listing-config/solar" hx-target="#config-fields" hx-swap="innerHTML">
                        <div class="border border-gray-700 rounded-lg p-4 text-center peer-checked:border-amber-500 peer-checked:bg-amber-900/20 transition-all hover:border-gray-600">
                            <svg class="w-8 h-8 text-amber-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
                            </svg>
                            <span class="text-white text-sm font-medium">Solar</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="resource_type" value="bandwidth" class="sr-only peer"
                            {% if selected_type == 'bandwidth' %}checked{% endif %}
                            hx-get="/htmx/listing-config/bandwidth" hx-target="#config-fields" hx-swap="innerHTML">
                        <div class="border border-gray-700 rounded-lg p-4 text-center peer-checked:border-blue-500 peer-checked:bg-blue-900/20 transition-all hover:border-gray-600">
                            <svg class="w-8 h-8 text-blue-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"/>
                            </svg>
                            <span class="text-white text-sm font-medium">Bandwidth</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="resource_type" value="gpu" class="sr-only peer"
                            {% if selected_type == 'gpu' %}checked{% endif %}
                            hx-get="/htmx/listing-config/gpu" hx-target="#config-fields" hx-swap="innerHTML">
                        <div class="border border-gray-700 rounded-lg p-4 text-center peer-checked:border-purple-500 peer-checked:bg-purple-900/20 transition-all hover:border-gray-600">
                            <svg class="w-8 h-8 text-purple-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"/>
                            </svg>
                            <span class="text-white text-sm font-medium">GPU</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Basic Info -->
            <div>
                <label for="title" class="block text-sm font-medium text-gray-300">Title</label>
                <input type="text" name="title" id="title" required
                    class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none"
                    placeholder="e.g., 10kW Solar Array — Peak Afternoon Export">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-300">Description</label>
                <textarea name="description" id="description" rows="3"
                    class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none"
                    placeholder="Describe your resource, capacity, reliability..."></textarea>
            </div>

            <!-- Type-specific config fields (loaded via HTMX) -->
            <div id="config-fields">
                {% include "components/config_solar.html" %}
            </div>

            <!-- Pricing -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="price_per_unit" class="block text-sm font-medium text-gray-300">Price per unit ($)</label>
                    <input type="number" name="price_per_unit" id="price_per_unit" step="0.001" min="0.001" required
                        class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none"
                        placeholder="0.08">
                </div>
                <div>
                    <label for="min_quantity" class="block text-sm font-medium text-gray-300">Minimum quantity</label>
                    <input type="number" name="min_quantity" id="min_quantity" step="0.01" min="0.01" value="1"
                        class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                </div>
            </div>

            <!-- Location -->
            <div>
                <label for="location" class="block text-sm font-medium text-gray-300">Location (optional)</label>
                <input type="text" name="location" id="location"
                    class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none"
                    placeholder="City, State">
            </div>

            <!-- Automation -->
            <div class="flex items-center space-x-3">
                <input type="checkbox" name="auto_accept" id="auto_accept" value="true"
                    class="rounded border-gray-700 bg-gray-800 text-brand-600 focus:ring-brand-500">
                <label for="auto_accept" class="text-sm text-gray-300">Auto-accept orders (skip manual approval)</label>
            </div>

            <button type="submit"
                class="w-full bg-brand-600 hover:bg-brand-500 text-white py-3 rounded-lg font-medium transition-colors">
                Create Listing
            </button>
        </form>
    </div>
</div>
{% endblock %}
