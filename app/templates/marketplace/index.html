{% extends "base.html" %}
{% block title %}Marketplace — Resourceful{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8 animate-fade-in">
    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white">Marketplace</h1>
        <p class="mt-1 text-gray-400">Browse and purchase available resources from verified providers.</p>
    </div>

    <!-- Filters -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-6">
        <form hx-get="/htmx/marketplace/listings" hx-target="#listings-grid" hx-trigger="submit, change from:select"
              class="flex flex-wrap gap-4 items-end">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs font-medium text-gray-400 mb-1">Search</label>
                <input type="text" name="search" placeholder="Search listings..."
                    class="block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white placeholder-gray-500 text-sm focus:border-brand-500 focus:outline-none">
            </div>
            <div class="w-40">
                <label class="block text-xs font-medium text-gray-400 mb-1">Resource Type</label>
                <select name="resource_type"
                    class="block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                    <option value="">All Types</option>
                    <option value="solar" {% if filter_type == 'solar' %}selected{% endif %}>Solar</option>
                    <option value="bandwidth" {% if filter_type == 'bandwidth' %}selected{% endif %}>Bandwidth</option>
                    <option value="gpu" {% if filter_type == 'gpu' %}selected{% endif %}>GPU Compute</option>
                </select>
            </div>
            <div class="w-32">
                <label class="block text-xs font-medium text-gray-400 mb-1">Sort By</label>
                <select name="sort_by"
                    class="block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                    <option value="created_at">Newest</option>
                    <option value="price_per_unit">Price</option>
                    <option value="avg_rating">Rating</option>
                </select>
            </div>
            <button type="submit"
                class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                Search
            </button>
        </form>
    </div>

    <!-- Listings Grid -->
    <div id="listings-grid" hx-get="/htmx/marketplace/listings" hx-trigger="load" hx-swap="innerHTML">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for i in range(6) %}
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 animate-pulse">
                <div class="h-4 bg-gray-800 rounded w-3/4 mb-3"></div>
                <div class="h-3 bg-gray-800 rounded w-1/2 mb-2"></div>
                <div class="h-3 bg-gray-800 rounded w-full mb-4"></div>
                <div class="h-8 bg-gray-800 rounded w-24"></div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
