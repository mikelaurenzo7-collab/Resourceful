{% extends "base.html" %}
{% block title %}Edit Listing — Resourceful{% endblock %}

{% block content %}
<div class="mx-auto max-w-3xl px-4 py-8 sm:px-6 lg:px-8 animate-fade-in">
    <a href="/dashboard" class="text-gray-400 hover:text-white text-sm mb-4 inline-block">&larr; Back to dashboard</a>

    <div class="mb-8">
        <h1 class="text-3xl font-bold text-white">Edit Listing</h1>
        <p class="mt-1 text-gray-400">Update your resource listing details.</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-xl p-6">
        {% if error %}
        <div class="mb-4 rounded-lg bg-red-900/50 border border-red-800 p-3 text-sm text-red-200">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/listings/{{ listing.id }}/edit" class="space-y-6">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">Resource Type</label>
                <span class="inline-flex items-center rounded-md px-2 py-1 text-xs font-medium ring-1 ring-inset
                    {% if listing.resource_type == 'solar' %}bg-amber-400/10 text-amber-400 ring-amber-400/30
                    {% elif listing.resource_type == 'bandwidth' %}bg-blue-400/10 text-blue-400 ring-blue-400/30
                    {% else %}bg-purple-400/10 text-purple-400 ring-purple-400/30{% endif %}">
                    {{ listing.resource_type_name or listing.resource_type }}
                </span>
            </div>

            <div>
                <label for="title" class="block text-sm font-medium text-gray-300">Title</label>
                <input type="text" name="title" id="title" required value="{{ listing.title }}"
                    class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-300">Description</label>
                <textarea name="description" id="description" rows="3"
                    class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">{{ listing.description or '' }}</textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="price_per_unit" class="block text-sm font-medium text-gray-300">Price per unit ($)</label>
                    <input type="number" name="price_per_unit" id="price_per_unit" step="0.001" min="0.001" required
                        value="{{ listing.price_per_unit }}"
                        class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                </div>
                <div>
                    <label for="min_quantity" class="block text-sm font-medium text-gray-300">Minimum quantity</label>
                    <input type="number" name="min_quantity" id="min_quantity" step="0.01" min="0.01"
                        value="{{ listing.min_quantity }}"
                        class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                </div>
            </div>

            <div>
                <label for="location" class="block text-sm font-medium text-gray-300">Location (optional)</label>
                <input type="text" name="location" id="location" value="{{ listing.location or '' }}"
                    class="mt-1 block w-full rounded-lg border border-gray-700 bg-gray-800 px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none"
                    placeholder="City, State">
            </div>

            <div class="flex items-center space-x-6">
                <div class="flex items-center space-x-3">
                    <input type="checkbox" name="is_available" id="is_available" value="true"
                        {% if listing.is_available %}checked{% endif %}
                        class="rounded border-gray-700 bg-gray-800 text-brand-600 focus:ring-brand-500">
                    <label for="is_available" class="text-sm text-gray-300">Available for orders</label>
                </div>
                <div class="flex items-center space-x-3">
                    <input type="checkbox" name="auto_accept" id="auto_accept" value="true"
                        {% if listing.auto_accept %}checked{% endif %}
                        class="rounded border-gray-700 bg-gray-800 text-brand-600 focus:ring-brand-500">
                    <label for="auto_accept" class="text-sm text-gray-300">Auto-accept orders</label>
                </div>
            </div>

            <div class="flex space-x-3">
                <button type="submit"
                    class="flex-1 bg-brand-600 hover:bg-brand-500 text-white py-3 rounded-lg font-medium transition-colors">
                    Save Changes
                </button>
                <a href="/dashboard" class="px-6 py-3 rounded-lg border border-gray-700 text-gray-300 hover:text-white text-center font-medium transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
