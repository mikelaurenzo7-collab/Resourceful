<div class="bg-gray-800 rounded-lg p-4 flex items-center justify-between animate-fade-in">
    <div>
        <div class="text-white text-sm font-medium">{{ order.listing_title or 'Order' }}</div>
        <div class="text-gray-500 text-xs">{{ order.quantity }} units &middot; ${{ "%.2f"|format(order.total_price) }}</div>
    </div>
    <span class="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-medium
        {% if order.status == 'completed' %}bg-green-400/10 text-green-400
        {% elif order.status == 'pending' %}bg-yellow-400/10 text-yellow-400
        {% elif order.status == 'accepted' or order.status == 'active' %}bg-blue-400/10 text-blue-400
        {% elif order.status == 'cancelled' %}bg-red-400/10 text-red-400
        {% else %}bg-gray-400/10 text-gray-400{% endif %}">
        {{ order.status | title }}
    </span>
</div>
