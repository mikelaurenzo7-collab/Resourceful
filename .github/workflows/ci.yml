name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Mock env vars needed for build (Next.js sometimes needs these during build for static generation)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          ANTHROPIC_API_KEY: placeholder
          AI_MODEL_PRIMARY: claude-3-5-sonnet-20240620
          AI_MODEL_FAST: claude-3-haiku-20240307
          GEMINI_API_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          RESEND_API_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          CRON_SECRET: placeholder
          ATTOM_API_KEY: placeholder
          REPORT_ACCESS_TOKEN_SECRET: placeholder
          SENTRY_DSN: https://placeholder@sentry.io/123
          NEXT_PUBLIC_SENTRY_DSN: https://placeholder@sentry.io/123
