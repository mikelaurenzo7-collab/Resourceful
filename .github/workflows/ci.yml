name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # Build-time env vars (mostly public or placeholders)
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          NEXT_PUBLIC_APP_URL: https://resourceful.app
          NEXT_PUBLIC_AZURE_MAPS_CLIENT_ID: placeholder
          NEXT_PUBLIC_MAPILLARY_ACCESS_TOKEN: placeholder
          # Sentry auth token is required for source map upload during build if configured in Vercel/GitHub
          # SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # The following are required by validate-env.ts at startup/build time if instrumentation runs
          ANTHROPIC_API_KEY: placeholder
          AI_MODEL_PRIMARY: claude-3-5-sonnet-20240620
          AI_MODEL_FAST: claude-3-haiku-20240307
          GEMINI_API_KEY: placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: placeholder
          RESEND_API_KEY: placeholder
          CRON_SECRET: placeholder
          ATTOM_API_KEY: placeholder
          REPORT_ACCESS_TOKEN_SECRET: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
